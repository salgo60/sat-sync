name: Regenerate SAT POI Dashboard

on:
  schedule:
    # Körs varje dag kl 04:17 UTC (06:17 svensk sommartid)
    - cron: "17 4 * * *"
  workflow_dispatch:  # Tillåter manuell körning från GitHub UI

jobs:
  regen:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generera dashboard
        run: python3 generate_poi_dashboard.py

      - name: Commita om filen ändrats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sat_poi_dashboard.html
          if git diff --cached --quiet; then
            echo "Ingen förändring – hoppar över commit"
          else
            git commit -m "Auto-regenerate dashboard $(date -u +%Y%m%d\ %H:%M) UTC"
            git push
          fi
